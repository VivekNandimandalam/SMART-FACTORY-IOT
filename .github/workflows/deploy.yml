name: Deploy Smart Factory IoT

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  LAMBDA_FUNCTION_NAME: smart-factory-processor
  DYNAMODB_TABLE: SensorReadings

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package Lambda
        run: |
          cd backend/lambda
          zip -q function.zip handler.py

      - name: Deploy Lambda
        env:
          LAMBDA_ROLE_ARN: "arn:aws:iam::323282433029:role/LabRole"
        run: |
          if aws lambda get-function --function-name "$LAMBDA_FUNCTION_NAME" >/dev/null 2>&1; then
            aws lambda update-function-code \
              --function-name "$LAMBDA_FUNCTION_NAME" \
              --zip-file fileb://backend/lambda/function.zip

            aws lambda wait function-updated \
              --function-name "$LAMBDA_FUNCTION_NAME"

          else
            aws lambda create-function \
              --function-name "$LAMBDA_FUNCTION_NAME" \
              --runtime python3.11 \
              --handler handler.lambda_handler \
              --role "$LAMBDA_ROLE_ARN" \
              --zip-file fileb://backend/lambda/function.zip \
              --timeout 30 \
              --memory-size 256 \
              --environment "Variables={TABLE_NAME=$DYNAMODB_TABLE}"

            aws lambda wait function-updated \
              --function-name "$LAMBDA_FUNCTION_NAME"
          fi

          aws lambda update-function-configuration \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --handler handler.lambda_handler \
            --runtime python3.11 \
            --environment "Variables={TABLE_NAME=$DYNAMODB_TABLE}"

          aws lambda wait function-updated \
            --function-name "$LAMBDA_FUNCTION_NAME"

      - name: Confirm Lambda deployment
        run: |
          aws lambda get-function \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --query 'Configuration.[FunctionName,Runtime,Handler,State]' \
            --output table